name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

env:
  DOCKER_IMAGE: docker.io/beancan0325/demo
  GITOPS_REPO: BeanCan0325/ArgoCD
  DEPLOYMENT_FILE: apps/demo/gitops-deployment.yaml

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Build with Gradle
      run: gradle bootJar
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ env.DOCKER_IMAGE }}:latest
          ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
    
    - name: Update GitOps repo
      run: |
        git clone https://x-access-token:${{ secrets.GITOPS_REPO_TOKEN }}@github.com/${{ env.GITOPS_REPO }}.git
        cd ArgoCD
        sed -i "s|image: docker.io/beancan0325/demo:.*|image: docker.io/beancan0325/demo:${{ github.sha }}|g" ${{ env.DEPLOYMENT_FILE }}
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add .
        git commit -m "Update image to ${{ github.sha }}"
        git push
